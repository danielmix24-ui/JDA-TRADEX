  function validarAccesoGlobal(event) {
      event.preventDefault();
      const userIn = document.getElementById("username").value.trim().toLowerCase();
      const passIn = document.getElementById("password").value;
      let autenticado = false; let nombre = ""; let rol = "";

      }

      if (autenticado) {

          localStorage.setItem("tradex_rol_activo", rol);

  function desplegarDashboard(nombre, rol) {

      document.getElementById('today-date').innerText = new Date().toLocaleDateString('es-VE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

      const mTrigger = document.getElementById('m-nav-admin-trigger');

          document.getElementById("nav-section-admin-config").style.display = "none";
          document.getElementById("m-nav-caja").style.display = "none";
          if(mTrigger) mTrigger.style.display = "none";
          if(campoTasa) { campoTasa.readOnly = true; campoTasa.classList.add('bloqueado-vendedor'); }
          if(thAcciones) thAcciones.style.display = "none";
      } else {
          document.getElementById("nav-section-admin-finanzas").style.display = "block";
          document.getElementById("nav-section-admin-config").style.display = "block";
          document.getElementById("m-nav-caja").style.display = "flex";
          if(mTrigger) mTrigger.style.display = "flex";
          if(campoTasa) { campoTasa.readOnly = false; campoTasa.classList.remove('bloqueado-vendedor'); }
          if(thAcciones) thAcciones.style.display = "table-cell";
      }
  }

  // CLIENTES FIRESTORE
  function guardarNuevoCliente() {
      const nom = document.getElementById('cl-nombre').value.trim();
      if(!nom) return;
      const cliente = {
          nombre: nom,
          cedula: document.getElementById('cl-cedula').value,
          telefono: document.getElementById('cl-telefono').value,
          pais: document.getElementById('cl-pais').value,
          banco: document.getElementById('cl-banco').value
      };
      db.collection("clientes").add(cliente)
      .then(() => {
          closeModal('modal-cliente');
          pushNotification("👤 Cliente registrado.");
          renderizarTablaClientes();
          sconizarSelectoresDeClientes();
      });
  }
  function renderizarTablaClientes() {
      const tbody = document.getElementById('clientes-tbody');
      if(!tbody) return;
      tbody.innerHTML = "";
      db.collection("clientes").get().then((querySnapshot) => {
          let clientes = [];
          querySnapshot.forEach((doc) => { clientes.push(doc.data()); });
          clientes.forEach(c => {
              let row = document.createElement('tr');
              row.innerHTML = `<td><strong>${c.nombre}</strong></td><td>${c.cedula}</td><td>${c.telefono}</td><td>${c.pais}</td><td><small>${c.banco}</small></td>`;
              tbody.appendChild(row);
          });
          document.getElementById('dash-clientes-val').innerText = clientes.length;
      });
  }
  function sconizarSelectoresDeClientes() {
      db.collection("clientes").get().then((querySnapshot) => {
          let clientes = [];
          querySnapshot.forEach((doc) => { clientes.push(doc.data()); });
          document.querySelectorAll('.js-select-clientes').forEach(sel => {
              sel.innerHTML = "";
              clientes.forEach(c => {
                  let op = document.createElement('option'); op.value = c.nombre; op.innerText = `${c.nombre} (${c.cedula})`; sel.appendChild(op);
              });
          });
      });
  }
